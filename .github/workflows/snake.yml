name: Generate Snake Animation

on:
  # Run automatically every hour
  schedule:
    - cron: "0 */1 * * *"
  
  # Allows manual trigger
  workflow_dispatch:
  
  # Run on push to main branch
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main

      # Generate the SVG snake game
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: VamshiKrishna1501
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Checkout the output branch
      - name: Checkout output branch
        uses: actions/checkout@v3
        with:
          ref: output
      
      # Copy generated SVGs to the branch
      - name: Prepare files for output
        run: |
          mkdir -p dist
          cp dist/github-contribution-grid-snake.svg dist/
          cp dist/github-contribution-grid-snake-dark.svg dist/

      # Commit and push changes to output branch
      - name: Commit and push SVGs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add dist/*
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Update contribution grid snake SVGs"
          git push origin output
