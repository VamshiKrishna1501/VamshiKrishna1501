name: Generate Snake Animation

on:
  # Run hourly
  schedule:
    - cron: "0 */1 * * *"
  # Manual trigger
  workflow_dispatch:
  # On push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main

      # Generate the SVG snake game
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: VamshiKrishna1501
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List files after generation
        run: |
          echo "Listing dist/ directory:"
          ls -l dist/

      # Checkout the output branch
      - name: Checkout output branch
        uses: actions/checkout@v3
        with:
          ref: output

      # Prepare files for output
      - name: Copy generated SVGs to output branch
        run: |
          mkdir -p dist
          cp ../main/dist/github-contribution-grid-snake.svg dist/
          cp ../main/dist/github-contribution-grid-snake-dark.svg dist/

      # Commit and push changes
      - name: Commit and push SVGs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add dist/*
          git diff --cached --quiet || git commit -m "Update contribution grid snake SVGs"
          git push origin output
