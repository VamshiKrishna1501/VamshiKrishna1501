name: Maintain GitHub Streak

on:
  schedule:
    - cron: "0 * * * *"   # Runs hourly
  workflow_dispatch:

jobs:
  auto-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FILE_PATH: "public/auto-streak/streakdatakeeper.txt"
      MIN_COMMITS: 2
      MAX_COMMITS: 5
      BRANCH_NAME: "main"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Generate Dynamic Commit Message
        id: message
        run: |
          # Generate a random message
          MESSAGES=("Morning update" "Keep streak alive" "Auto streak boost" "Daily activity" "Maintaining streak")
          MESSAGE=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          echo "commit_message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Run Auto-Streak Keeper
        uses: bmiit145/auto-streak-keeper@v1.0.1
        with:
          file-path: ${{ env.FILE_PATH }}
          min-commits: ${{ env.MIN_COMMITS }}
          max-commits: ${{ env.MAX_COMMITS }}
          commit-message: ${{ steps.message.outputs.commit_message }}
          user-name: ${{ secrets.GITHUB_USER_NAME }}
          user-email: ${{ secrets.GITHUB_USER_EMAIL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch-name: ${{ env.BRANCH_NAME }}
