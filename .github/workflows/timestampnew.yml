name: Update Timestamp Every 30 Minutes

on:
  schedule:
    - cron: "*/30 * * * *"   # Runs every 30 minutes (cron is interpreted in UTC by GitHub)
  workflow_dispatch:       # Allows manual trigger

jobs:
  update-timestamp:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Create or update timestamp file (Central Time)
        run: |
          mkdir -p data
          TZ='America/Chicago' date '+Last updated ON: %Y-%m-%d %H:%M:%S %Z' > data/timestampnew.txt

      - name: Add and commit timestamp file
        run: |
          git config --global user.name "VamshiKrishna1501"
          git config --global user.email "vamshihoneyy@gmail.com"
          git add data/timestamp.txt
          git diff --cached --quiet || git commit -m "Update timestamp"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin main
